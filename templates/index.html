<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maze Lab</title>
<style>
  /* ── Reset & base ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #11141c;
    --surface:   #191e2a;
    --panel:     #1f2634;
    --panel2:    #28313e;
    --field:     #2b3344;
    --field-act: #3a4558;
    --text:      #ecf0f7;
    --muted:     #96a0b2;
    --wall:      #e6ebf4;
    --visited:   #2f3952;
    --accent:    #ff7a56;
    --good:      #5bdb90;
    --player:    #50beff;
    --goal:      #5be297;
    --path:      #ffda66;
    --searched:  #4e689c;
    --frontier:  #8974d3;
    --coin:      #66e8ca;
    --shadow:    rgba(0,0,0,.55);
    --radius:    10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Consolas", "Courier New", monospace;
    overflow: hidden;
  }

  /* ── Layout ───────────────────────────────────────────────────────── */
  #app {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  #maze-area {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-width: 0;
  }

  canvas {
    display: block;
    border-radius: var(--radius);
    box-shadow: 0 6px 32px var(--shadow);
    image-rendering: pixelated;
    cursor: default;
  }

  /* ── Side panel ───────────────────────────────────────────────────── */
  #panel {
    width: 320px;
    min-width: 280px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 2px solid var(--panel2);
    display: flex;
    flex-direction: column;
    padding: 24px 20px 20px;
    gap: 0;
    overflow-y: auto;
  }

  #panel h1 {
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 18px;
  }

  /* ── Stats row ────────────────────────────────────────────────────── */
  #stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--panel2);
    border-radius: 7px;
    padding: 6px 12px;
    font-size: .78rem;
    color: var(--muted);
  }

  .stat span { color: var(--text); font-weight: 600; }
  .stat.coin  span { color: var(--coin); }
  .stat.good  span { color: var(--good); }

  /* ── Message bar ──────────────────────────────────────────────────── */
  #message {
    min-height: 32px;
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 14px;
    padding: 6px 10px;
    background: var(--panel2);
    border-radius: 7px;
    border-left: 3px solid var(--panel2);
    transition: border-color .25s, color .25s;
    word-break: break-word;
  }

  /* ── Section label ────────────────────────────────────────────────── */
  .section-label {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 8px;
    margin-top: 14px;
  }

  /* ── Generate controls ────────────────────────────────────────────── */
  #gen-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 10px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .input-group label {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
  }

  .input-group input {
    background: var(--field);
    border: 2px solid var(--panel2);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: .9rem;
    padding: 7px 10px;
    width: 100%;
    outline: none;
    transition: border-color .2s, background .2s;
  }

  .input-group input:focus {
    border-color: var(--accent);
    background: var(--field-act);
  }

  /* ── Buttons ──────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: 2px solid var(--panel2);
    border-radius: 8px;
    background: var(--panel2);
    color: var(--text);
    font-family: inherit;
    font-size: .78rem;
    padding: 8px 14px;
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s, transform .1s;
    white-space: nowrap;
    user-select: none;
  }

  .btn:hover:not(:disabled) {
    background: #3d4d62;
    border-color: var(--accent);
  }

  .btn:active:not(:disabled) { transform: translateY(1px); }

  .btn:disabled {
    opacity: .4;
    cursor: not-allowed;
  }

  .btn.primary {
    background: #2b3d3a;
    border-color: var(--good);
    color: var(--good);
  }

  .btn.primary:hover:not(:disabled) {
    background: #3a5248;
    border-color: var(--good);
  }

  .btn.accent {
    background: #3d2820;
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.accent:hover:not(:disabled) {
    background: #5a3020;
  }

  .btn.selected {
    background: var(--accent);
    border-color: #ffb49a;
    color: #12141a;
    font-weight: 700;
  }

  /* ── Button grid ──────────────────────────────────────────────────── */
  #action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  #action-row .btn { flex: 1; }

  #solver-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  #compare-btn { grid-column: 1 / -1; }

  /* ── Progress bar ─────────────────────────────────────────────────── */
  #progress-wrap {
    display: none;
    margin-bottom: 10px;
  }

  #progress-wrap.visible { display: block; }

  #progress-label {
    font-size: .72rem;
    color: var(--accent);
    margin-bottom: 4px;
  }

  #progress-bar-bg {
    height: 8px;
    background: var(--field);
    border-radius: 6px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    width: 0%;
    transition: width .15s;
  }

  /* ── Comparison table ─────────────────────────────────────────────── */
  #comparison {
    display: none;
    background: #181e2a;
    border: 2px solid var(--panel2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: .75rem;
  }

  #comparison.visible { display: block; }

  #comparison h3 {
    font-size: .8rem;
    color: var(--text);
    margin-bottom: 8px;
  }

  #comparison table {
    width: 100%;
    border-collapse: collapse;
  }

  #comparison th {
    color: var(--muted);
    text-align: left;
    padding-bottom: 4px;
    font-weight: 400;
    font-size: .72rem;
  }

  #comparison td {
    color: var(--text);
    padding: 2px 0;
  }

  #comparison td:not(:first-child) { text-align: right; }
  #comparison th:not(:first-child) { text-align: right; }

  /* ── Legend ───────────────────────────────────────────────────────── */
  #legend {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--panel2);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── D-pad (mobile) ───────────────────────────────────────────────── */
  #dpad {
    display: none;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
    justify-content: center;
    margin-bottom: 14px;
  }

  @media (max-width: 700px) {
    #dpad { display: grid; }
    #panel { width: 100%; min-width: unset; }
    #app { flex-direction: column; }
    #maze-area { padding: 10px; }
  }

  .dpad-btn {
    background: var(--panel2);
    border: 2px solid var(--field);
    border-radius: 8px;
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background .1s;
  }

  .dpad-btn:active { background: var(--field-act); }
  .dpad-btn.empty { visibility: hidden; }

  /* ── Solver status ────────────────────────────────────────────────── */
  #solver-status {
    font-size: .75rem;
    color: var(--path);
    margin-bottom: 8px;
    min-height: 18px;
  }

  /* ── Spinner ──────────────────────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <!-- ── Maze canvas ─────────────────────────────────────────────── -->
  <div id="maze-area">
    <canvas id="canvas"></canvas>
  </div>

  <!-- ── Side panel ─────────────────────────────────────────────── -->
  <aside id="panel">
    <h1>Maze Lab</h1>
    <p class="subtitle">Generate · Play · Solve</p>

    <!-- Stats -->
    <div id="stats">
      <div class="stat">Grid <span id="stat-grid">—</span></div>
      <div class="stat">Moves <span id="stat-moves">0</span></div>
      <div class="stat coin">Shards <span id="stat-shards">0/0</span></div>
    </div>

    <!-- Message -->
    <div id="message">Loading maze…</div>

    <!-- Generate -->
    <div class="section-label">New Maze</div>
    <div id="gen-row">
      <div class="input-group">
        <label for="inp-cols">Cols</label>
        <input id="inp-cols" type="number" value="25" min="5" max="120" />
      </div>
      <div class="input-group">
        <label for="inp-rows">Rows</label>
        <input id="inp-rows" type="number" value="18" min="5" max="90" />
      </div>
      <button class="btn primary" id="gen-btn">Generate</button>
    </div>

    <!-- Progress -->
    <div id="progress-wrap">
      <div id="progress-label">Generating…</div>
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    </div>

    <!-- Action buttons -->
    <div class="section-label">Actions</div>
    <div id="action-row">
      <button class="btn" id="regen-btn">↺ Regenerate</button>
      <button class="btn accent" id="reset-pos-btn">⌂ Reset Player</button>
    </div>

    <!-- D-pad (touch) -->
    <div id="dpad">
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" data-dir="up">▲</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" data-dir="left">◀</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" data-dir="right">▶</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" data-dir="down">▼</div>
      <div class="dpad-btn empty"></div>
    </div>

    <!-- Solvers -->
    <div class="section-label">Pathfinding Solvers</div>
    <div id="solver-status"></div>
    <div id="solver-grid">
      <button class="btn" data-algo="BFS">▶ BFS</button>
      <button class="btn" data-algo="DFS">▶ DFS</button>
      <button class="btn" data-algo="Dijkstra">▶ Dijkstra</button>
      <button class="btn" data-algo="A*">▶ A*</button>
      <button class="btn primary" id="compare-btn">⚡ Compare All</button>
    </div>

    <!-- Comparison table -->
    <div id="comparison">
      <h3>Comparison</h3>
      <table>
        <thead>
          <tr>
            <th>Solver</th><th>Path</th><th>Seen</th><th>ms</th>
          </tr>
        </thead>
        <tbody id="cmp-body"></tbody>
      </table>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#50beff"></div>Player</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5be297"></div>Goal</div>
      <div class="legend-item"><div class="legend-dot" style="background:#66e8ca"></div>Collectible shard</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4e689c"></div>Searched cells</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8974d3"></div>Frontier cells</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffda66"></div>Solution path</div>
      <div class="legend-item" style="margin-top:6px;color:#96a0b2;font-size:.7rem;">
        Arrow keys / WASD to move
      </div>
    </div>
  </aside>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   Maze Lab — canvas renderer + REST client
   ═══════════════════════════════════════════════════════════════════════ */

// ── Colour palette (mirrors Python constants) ──────────────────────────
const C = {
  bg:       "#11141c",
  surface:  "#191e2a",
  visited:  "#2f3952",
  wall:     "#e6ebf4",
  player:   "#50beff",
  playerDk: "#0e1018",
  goal:     "#5be297",
  path:     "#ffda66",
  searched: "#4e689c",
  frontier: "#8974d3",
  coin:     "#66e8ca",
  accent:   "#ff7a56",
  trail:    "#3796d2",
  text:     "#ecf0f7",
};

// ── State ──────────────────────────────────────────────────────────────
let state = null;          // last server response
let animFrame = null;
let solving   = false;     // waiting for /api/solve response
let generating = false;    // waiting for /api/generate response

// Smooth player animation
let drawCol = 0, drawRow = 0;

// Solver animation state (client-side replay)
let solverAnim = null;     // { searched, frontier, path, idx, done }

// ── Canvas setup ───────────────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");

function cellSize(st) {
  const area  = document.getElementById("maze-area");
  const maxW  = area.clientWidth  - 16;
  const maxH  = area.clientHeight - 16;
  const byW   = Math.floor(maxW / st.cols);
  const byH   = Math.floor(maxH / st.rows);
  return Math.max(4, Math.min(32, byW, byH));
}

function resizeCanvas(st) {
  if (!st) return;
  const sz = cellSize(st);
  canvas.width  = st.cols * sz;
  canvas.height = st.rows * sz;
}

// ── Drawing ────────────────────────────────────────────────────────────
function draw() {
  if (!state) return;
  const st = state;
  const sz = cellSize(st);

  resizeCanvas(st);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = C.surface;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Cells (visited fill)
  for (const cell of st.cells) {
    if (cell.visited) {
      ctx.fillStyle = C.visited;
      ctx.fillRect(cell.col * sz, cell.row * sz, sz, sz);
    }
  }

  // Solver overlay
  const animSrc = solverAnim || st;
  const searchedSet  = new Set((animSrc.searched  || []).map(p => `${p.col},${p.row}`));
  const frontierSet  = new Set((animSrc.frontier  || []).map(p => `${p.col},${p.row}`));
  const pathSet      = new Set((animSrc.selected_path || []).map(p => `${p.col},${p.row}`));

  const pad = sz > 9 ? 2 : 1;

  for (const cell of st.cells) {
    const key = `${cell.col},${cell.row}`;
    if (searchedSet.has(key)) {
      ctx.fillStyle = C.searched;
      ctx.fillRect(cell.col * sz + pad, cell.row * sz + pad, sz - pad*2, sz - pad*2);
    }
    if (frontierSet.has(key)) {
      ctx.fillStyle = C.frontier;
      ctx.fillRect(cell.col * sz + pad, cell.row * sz + pad, sz - pad*2, sz - pad*2);
    }
  }

  // Solution path line
  const pathArr = solverAnim ? (solverAnim.selected_path || []) : (st.selected_path || []);
  if (pathArr.length >= 2) {
    ctx.beginPath();
    ctx.strokeStyle = C.path;
    ctx.lineWidth   = Math.max(3, sz / 4);
    ctx.lineCap     = "round";
    ctx.lineJoin    = "round";
    ctx.moveTo(pathArr[0].col * sz + sz/2, pathArr[0].row * sz + sz/2);
    for (let i = 1; i < pathArr.length; i++) {
      ctx.lineTo(pathArr[i].col * sz + sz/2, pathArr[i].row * sz + sz/2);
    }
    ctx.stroke();
  }

  // Walls
  const lw = sz <= 10 ? 1 : 2;
  ctx.strokeStyle = C.wall;
  ctx.lineWidth   = lw;
  for (const cell of st.cells) {
    const x = cell.col * sz, y = cell.row * sz;
    ctx.beginPath();
    if (cell.walls[0]) { ctx.moveTo(x, y);       ctx.lineTo(x+sz, y);       } // top
    if (cell.walls[1]) { ctx.moveTo(x+sz, y);    ctx.lineTo(x+sz, y+sz);    } // right
    if (cell.walls[2]) { ctx.moveTo(x+sz, y+sz); ctx.lineTo(x, y+sz);       } // bottom
    if (cell.walls[3]) { ctx.moveTo(x, y+sz);    ctx.lineTo(x, y);           } // left
    ctx.stroke();
  }

  // Trail
  for (let i = 0; i < st.trail.length; i++) {
    const t = st.trail[i];
    const alpha = (i + 1) / Math.max(1, st.trail.length);
    const ts = Math.max(2, Math.floor(sz * 0.22 * alpha));
    ctx.fillStyle = C.trail;
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillRect(t.col * sz + sz/2 - ts/2, t.row * sz + sz/2 - ts/2, ts, ts);
  }
  ctx.globalAlpha = 1;

  // Collectibles
  for (const c of st.collectibles) {
    const p = Math.max(2, Math.floor(sz / 4));
    ctx.fillStyle = C.coin;
    ctx.fillRect(c.col * sz + p, c.row * sz + p, sz - p*2, sz - p*2);
    if (sz >= 14) {
      ctx.fillStyle = C.text;
      ctx.fillRect(c.col * sz + sz/2 - 1, c.row * sz + p + 2, 2, 2);
    }
  }

  // Goal
  {
    const g = st.goal;
    const p = Math.max(2, Math.floor(sz / 5));
    ctx.fillStyle = C.goal;
    ctx.fillRect(g.col * sz + p, g.row * sz + p, sz - p*2, sz - p*2);
    if (sz >= 13) {
      ctx.fillStyle = C.text;
      ctx.fillRect(g.col * sz + p + 2, g.row * sz + p + 2, sz - p*2 - 4, 2);
    }
  }

  // Player (smooth interpolation)
  const tCol = st.player.col, tRow = st.player.row;
  const spd  = 0.32;
  drawCol += (tCol - drawCol) * spd;
  drawRow += (tRow - drawRow) * spd;
  if (Math.abs(tCol - drawCol) < 0.01) drawCol = tCol;
  if (Math.abs(tRow - drawRow) < 0.01) drawRow = tRow;

  {
    const x = drawCol * sz, y = drawRow * sz;
    const u = Math.max(1, Math.floor(sz / 6));
    ctx.fillStyle = C.player;
    ctx.fillRect(x + u, y + u, sz - u*2, sz - u*2);
    ctx.strokeStyle = C.playerDk;
    ctx.lineWidth = Math.max(1, Math.floor(u / 2));
    ctx.strokeRect(x + u, y + u, sz - u*2, sz - u*2);
    // Hat
    ctx.fillStyle = C.accent;
    ctx.fillRect(x + u*2, y, sz - u*4, Math.max(2, u));
    ctx.fillRect(x + u*3, y - u, sz - u*6, Math.max(2, u*2));
    // Eyes
    ctx.fillStyle = C.text;
    const ey = y + u*2;
    ctx.fillRect(x + sz - u*3, ey, Math.max(1,u), Math.max(1,u));
    ctx.fillRect(x + sz - u*2, ey, Math.max(1,u), Math.max(1,u));
  }

  animFrame = requestAnimationFrame(draw);
}

// ── Solver animation (client-side step replay) ─────────────────────────
const ANIM_STEPS_PER_FRAME = 4; // cells revealed per frame

function startSolverAnimation(serverState) {
  // Build a replay object that progressively reveals searched/frontier/path
  solverAnim = {
    searched:      [],
    frontier:      [],
    selected_path: [],
    _allSearched:  serverState.searched  || [],
    _allFrontier:  serverState.frontier  || [],
    _allPath:      serverState.selected_path || [],
    _idx:          0,
    _done:         false,
  };
  stepSolverAnimation();
}

function stepSolverAnimation() {
  if (!solverAnim || solverAnim._done) return;

  const total = solverAnim._allSearched.length;
  const end   = Math.min(solverAnim._idx + ANIM_STEPS_PER_FRAME, total);

  for (let i = solverAnim._idx; i < end; i++) {
    solverAnim.searched.push(solverAnim._allSearched[i]);
  }
  solverAnim._idx = end;

  // Frontier: show the last N items from allFrontier proportionally
  const ratio = total > 0 ? end / total : 1;
  const fEnd  = Math.floor(ratio * solverAnim._allFrontier.length);
  solverAnim.frontier = solverAnim._allFrontier.slice(0, fEnd);

  if (end >= total) {
    // Reveal path
    solverAnim.selected_path = solverAnim._allPath;
    solverAnim._done = true;
    solving = false;
    updateSolverStatus(state);
    setMessage("Path found! Yellow = solution route.", "#ffda66");
  } else {
    setTimeout(stepSolverAnimation, 16);
  }
}

// ── API helpers ────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function generateMaze() {
  if (generating || solving) return;
  generating = true;
  solverAnim = null;
  setButtons(true);
  setMessage('<span class="spinner"></span>Generating maze…', "#ff7a56");

  const cols = clamp(parseInt(document.getElementById("inp-cols").value) || 25, 5, 120);
  const rows = clamp(parseInt(document.getElementById("inp-rows").value) || 18, 5, 90);

  try {
    const data = await apiFetch("/api/generate", {
      method: "POST",
      body: JSON.stringify({ cols, rows }),
    });
    applyState(data);
    setMessage("Maze ready. Find the exit — grab shards if you feel fancy.", "#5bdb90");
  } catch (e) {
    setMessage("Generation failed: " + e.message, "#ff7a56");
  } finally {
    generating = false;
    setButtons(false);
  }
}

async function movePlayer(direction) {
  if (!state || generating || solving) return;
  try {
    const data = await apiFetch("/api/move", {
      method: "POST",
      body: JSON.stringify({ direction }),
    });
    applyState(data);
    if (data.blocked) {
      setMessage(randomChoice(["Wall says no.", "Bonk.", "That route is decorative.", "Solid pixels ahead."]), "#ff7a56");
    } else if (data.collected_now) {
      setMessage(randomChoice([
        "Data shard acquired.",
        "Tiny sparkle successfully looted.",
        "The maze approves. Probably.",
        "Inventory: one suspiciously useful pixel.",
      ]), "#66e8ca");
    } else if (data.won) {
      setMessage(`Exit found in ${data.moves} moves. Stylish.`, "#5bdb90");
    }
  } catch (e) {
    console.error("Move error:", e);
  }
}

async function runSolver(algorithm) {
  if (!state || generating || solving) return;
  solving = true;
  solverAnim = null;
  setButtons(true);
  updateSolverStatus({ selected_solver: algorithm, solver: { algorithm, visited_count: 0, done: false } });
  setMessage(`<span class="spinner"></span>${algorithm} is searching…`, "#ffda66");

  // Highlight selected solver button
  document.querySelectorAll("[data-algo]").forEach(b => {
    b.classList.toggle("selected", b.dataset.algo === algorithm);
  });

  try {
    const data = await apiFetch("/api/solve", {
      method: "POST",
      body: JSON.stringify({ algorithm }),
    });
    applyState(data);
    // Animate the result
    startSolverAnimation(data);
  } catch (e) {
    setMessage("Solver error: " + e.message, "#ff7a56");
    solving = false;
    setButtons(false);
  }
}

async function compareAll() {
  if (!state || generating || solving) return;
  solving = true;
  setButtons(true);
  setMessage('<span class="spinner"></span>Running all solvers…', "#ffda66");

  // Run all four in sequence via the API
  const algos = ["BFS", "DFS", "Dijkstra", "A*"];
  const results = [];
  for (const algo of algos) {
    try {
      const data = await apiFetch("/api/solve", {
        method: "POST",
        body: JSON.stringify({ algorithm: algo }),
      });
      if (data.solver) {
        results.push({
          algorithm: algo,
          path_length: (data.selected_path || []).length,
          visited: data.solver.visited_count,
          time_ms: data.solver.elapsed_ms,
        });
      }
      applyState(data);
    } catch (e) {
      console.error(algo, e);
    }
  }

  if (results.length) {
    renderComparison(results);
    setMessage("Comparison ready. Tiny spreadsheets, big drama.", "#5bdb90");
  }
  solving = false;
  setButtons(false);
}

// ── State application ──────────────────────────────────────────────────
function applyState(data) {
  state = data;
  updateStats(data);
  updateComparison(data);
  updateSolverStatus(data);
}

function updateStats(st) {
  document.getElementById("stat-grid").textContent   = `${st.cols}×${st.rows}`;
  document.getElementById("stat-moves").textContent  = st.moves;
  document.getElementById("stat-shards").textContent = `${st.collected}/${st.total_collectibles}`;
}

function updateComparison(st) {
  if (st.comparison) renderComparison(st.comparison);
}

function renderComparison(results) {
  const tbody = document.getElementById("cmp-body");
  tbody.innerHTML = results.map(r =>
    `<tr>
      <td>${r.algorithm}</td>
      <td>${r.path_length}</td>
      <td>${r.visited}</td>
      <td>${typeof r.time_ms === "number" ? r.time_ms.toFixed(1) : r.time_ms}</td>
    </tr>`
  ).join("");
  document.getElementById("comparison").classList.add("visible");
}

function updateSolverStatus(st) {
  const el = document.getElementById("solver-status");
  if (st.solver && !st.solver.done) {
    el.textContent = `${st.solver.algorithm}: ${st.solver.visited_count} cells visited…`;
  } else if (st.solver && st.solver.done) {
    const pathLen = (st.selected_path || []).length;
    el.textContent = `${st.solver.algorithm}: path ${pathLen}, visited ${st.solver.visited_count}, ${st.solver.elapsed_ms.toFixed(1)}ms`;
  } else {
    el.textContent = "";
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────
function setMessage(html, color = "#96a0b2") {
  const el = document.getElementById("message");
  el.innerHTML = html;
  el.style.color       = color;
  el.style.borderColor = color;
}

function setButtons(disabled) {
  document.querySelectorAll(".btn").forEach(b => b.disabled = disabled);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function randomChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Keyboard input ─────────────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp:    "up",    w: "up",    W: "up",
  ArrowDown:  "down",  s: "down",  S: "down",
  ArrowLeft:  "left",  a: "left",  A: "left",
  ArrowRight: "right", d: "right", D: "right",
};

document.addEventListener("keydown", e => {
  const dir = KEY_MAP[e.key];
  if (dir) {
    e.preventDefault();
    movePlayer(dir);
  }
});

// ── Button wiring ──────────────────────────────────────────────────────
document.getElementById("gen-btn").addEventListener("click", generateMaze);
document.getElementById("regen-btn").addEventListener("click", generateMaze);

document.getElementById("reset-pos-btn").addEventListener("click", async () => {
  if (!state || generating || solving) return;
  // Re-generate same size to reset player position
  document.getElementById("inp-cols").value = state.cols;
  document.getElementById("inp-rows").value = state.rows;
  await generateMaze();
});

document.querySelectorAll("[data-algo]").forEach(btn => {
  btn.addEventListener("click", () => runSolver(btn.dataset.algo));
});

document.getElementById("compare-btn").addEventListener("click", compareAll);

// D-pad
document.querySelectorAll(".dpad-btn[data-dir]").forEach(btn => {
  btn.addEventListener("click", () => movePlayer(btn.dataset.dir));
});

// ── Resize handling ────────────────────────────────────────────────────
window.addEventListener("resize", () => {
  if (state) resizeCanvas(state);
});

// ── Boot ───────────────────────────────────────────────────────────────
(async () => {
  // Try to load existing state, otherwise generate default
  try {
    const data = await apiFetch("/api/state");
    applyState(data);
    setMessage("Maze ready. Find the exit — grab shards if you feel fancy.", "#5bdb90");
  } catch {
    await generateMaze();
  }
  draw();
})();
</script>
</body>
</html>
